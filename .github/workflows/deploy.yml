name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Kodu indir
        uses: actions/checkout@v3

      - name: AWS credentials ayarla
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Deploy paketi oluştur
        run: |
          zip -r deploy.zip . -x "*.git*" -x "venv/*" -x "__pycache__/*"

      - name: S3'e yükle
        run: |
          aws s3 cp deploy.zip s3://${{ secrets.S3_BUCKET }}/deploy.zip

      - name: CodeDeploy ile deploy et
        run: |
          aws deploy create-deployment \
            --application-name agentic-api \
            --deployment-group-name agentic-api-group \
            --s3-location bucket=${{ secrets.S3_BUCKET }},key=deploy.zip,bundleType=zip