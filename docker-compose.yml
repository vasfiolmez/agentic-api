version: "3.8"

services:
  api:
    build: .
    ports:
      - "8001:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=agentic_db
    depends_on:
      - mongodb
    volumes:
      - .:/app

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: