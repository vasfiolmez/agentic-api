version: 0.0
os: linux

files:
  - source: /
    destination: /home/ubuntu/agentic-api

hooks:
  BeforeInstall:
    - location: scripts/stop_application.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/start_application.sh
      timeout: 300
      runas: root